{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Login to Zira</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium">Username</label>
            <input type="text" name="username" class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block text-sm font-medium">Password</label>
            <input type="password" name="password" class="w-full p-2 border rounded">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
